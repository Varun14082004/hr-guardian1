<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}HR System{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <div id="particles-js"></div>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark bg-opacity-75">
        <div class="container-fluid">
            <a class="navbar-brand" href="/"><i class="bi bi-shield-check"></i> HR Guardian</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    {% if session['role'] %}
                        <li class="nav-item">
                            <a class="nav-link" href="/logout"><i class="bi bi-box-arrow-right"></i> Logout</a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <div class="container content-container mt-4">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS.load('particles-js', "{{ url_for('static', filename='particles.json') }}", function() {
            console.log('particles.js loaded - callback');
        });

        {% if session['role'] %}
            // Smart Navigation Tracker
            let isInternalNavigation = false;

            // Mark navigation as internal when clicking links
            document.addEventListener('click', function(e) {
                const a = e.target.closest('a');
                if (a && a.href && a.href.startsWith(window.location.origin)) {
                    isInternalNavigation = true;
                }
            });

            // Mark navigation as internal when submitting forms
            document.addEventListener('submit', function() {
                isInternalNavigation = true;
            });

            // Heartbeat system (30s)
            function sendHeartbeat() {
                fetch('/heartbeat', { method: 'POST' });
            }
            setInterval(sendHeartbeat, 30000);

            // Auto Logout only on True Tab Close
            window.addEventListener('beforeunload', function (e) {
                if (!isInternalNavigation) {
                    navigator.sendBeacon('/logout');
                }
            });
        {% endif %}
    </script>
  </body>
</html>
